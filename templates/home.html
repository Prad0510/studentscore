<html>
<body>
    <div class="login">
        <h1>Student Score Prediction</h1>
        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <div class="input-group">
                <label class="form-label">Gender</label>
                <select class="form-control"name="gender" placeholder="Gender required" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="input-group">
                <label class="form-label">Race or Ethnicity</label>
                <select class="form-control" name="ethnicity" placeholder="Enter your ethnicity" required>
                    <option value="">Select Ethnicity</option>
                    <option value="Group A">Group A</option>
                    <option value="Group B">Group B</option>
                    <option value="Group C">Group C</option>
                    <option value="Group D">Group D</option>
                    <option value="Group E">Group E</option>
                </select>
            </div>
            <div class="input-group">
                <label class="form-label">Parental Level of Education</label>
                <select class="form-control" name="parental_level" placeholder="Enter your parental level of education" required>
                    <option value="">Select Parental Level</option>
                    <option value="Some High School">Some High School</option>
                    <option value="High School">High School</option>
                    <option value="Some College">Some College</option>
                    <option value="Associate's Degree">Associate's Degree</option>
                    <option value="Bachelor's Degree">Bachelor's Degree</option>
                    <option value="Master's Degree">Master's Degree</option>
                </select>
            </div>
            <div class="input-group">
                <label class="form-label">Lunch Type</label>
                <select class="form-control" name="lunch" placeholder="Enter your lunch type" required>
                    <option value="">Select Lunch Type</option>
                    <option value="Standard">Standard</option>
                    <option value="Free/Reduced">Free/Reduced</option>
                </select>
            </div>
            <div class="input-group">
                <label class="form-label">Test Preparation Course</label>
                <select class="form-control" name="test_preparation" placeholder="Enter your test preparation course" required>
                    <option value="">Select Test Preparation Course</option>
                    <option value="None">None</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div class="input-group">
                <label class="form-label">Writing Score</label>
                <input type="number" class="form-control"name="writing_score" 
                placeholder="Enter your writing score" min="0" max="100" required>
            </div>
            <div class="input-group">
                <label class="form-label">Reading Score</label>
                <input type="number" class="form-control" name="reading_score" 
                placeholder="Enter your reading score" min="0" max="100" required>
                <div class="input-group">
                    <input class="btn btn -primary" type="submit" value="Predict Score" required/>
                </div>
        </form>
        <h2>
            THE PREDICTED SCORE IS: {{ prediction }}
        </h2>
    </div>
</body>
</html>
